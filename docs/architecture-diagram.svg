<svg viewBox="0 0 1180 560" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4da3ff"/>
    </marker>
    <marker id="arrowMuted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a6474"/>
    </marker>
  </defs>

  <rect width="1180" height="560" fill="#0a0d12"/>

  <text x="30" y="40" fill="#e7ecf3" font-size="20" font-weight="700" letter-spacing="-0.3">AEGIS control loop</text>
  <text x="30" y="62" fill="#8b95a5" font-size="13">Adaptive Autonomy Infrastructure — the cumulative chain every specification inherits from (SPEC-000 §6)</text>

  <!-- Row 1: decision plane -->
  <g font-size="12.5" font-weight="600">
    <!-- IDENTIFY -->
    <rect x="30" y="100" width="140" height="60" rx="10" fill="#12161d" stroke="#2f3947"/>
    <text x="100" y="126" fill="#e7ecf3" text-anchor="middle">IDENTIFY</text>
    <text x="100" y="144" fill="#8b95a5" font-size="10" font-weight="400" text-anchor="middle">SPEC-001/002</text>

    <line x1="170" y1="130" x2="204" y2="130" stroke="#4da3ff" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- UNDERSTAND -->
    <rect x="206" y="100" width="140" height="60" rx="10" fill="#12161d" stroke="#2f3947"/>
    <text x="276" y="126" fill="#e7ecf3" text-anchor="middle">UNDERSTAND</text>
    <text x="276" y="144" fill="#8b95a5" font-size="10" font-weight="400" text-anchor="middle">SPEC-001 CAM</text>

    <line x1="346" y1="130" x2="380" y2="130" stroke="#4da3ff" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- ASSESS -->
    <rect x="382" y="100" width="150" height="60" rx="10" fill="#12161d" stroke="#2f3947"/>
    <text x="457" y="120" fill="#e7ecf3" text-anchor="middle">ASSESS</text>
    <text x="457" y="136" fill="#8b95a5" font-size="9.5" font-weight="400" text-anchor="middle">competence · novelty</text>
    <text x="457" y="149" fill="#8b95a5" font-size="9.5" font-weight="400" text-anchor="middle">epistemic · consequence</text>

    <line x1="532" y1="130" x2="566" y2="130" stroke="#4da3ff" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- DECIDE -->
    <rect x="568" y="100" width="140" height="60" rx="10" fill="#12161d" stroke="#2f3947"/>
    <text x="638" y="126" fill="#e7ecf3" text-anchor="middle">DECIDE</text>
    <text x="638" y="144" fill="#8b95a5" font-size="10" font-weight="400" text-anchor="middle">SPEC-007</text>

    <line x1="708" y1="130" x2="742" y2="130" stroke="#4da3ff" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- GRANT -->
    <rect x="744" y="100" width="130" height="60" rx="10" fill="#12161d" stroke="#2f3947"/>
    <text x="809" y="126" fill="#e7ecf3" text-anchor="middle">GRANT</text>
    <text x="809" y="144" fill="#8b95a5" font-size="10" font-weight="400" text-anchor="middle">Autonomy Grant</text>

    <line x1="874" y1="130" x2="908" y2="130" stroke="#4da3ff" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- VERIFY -->
    <rect x="910" y="100" width="130" height="60" rx="10" fill="#12161d" stroke="#2f3947"/>
    <text x="975" y="126" fill="#e7ecf3" text-anchor="middle">VERIFY</text>
    <text x="975" y="144" fill="#8b95a5" font-size="10" font-weight="400" text-anchor="middle">SPEC-008 gateway</text>
  </g>

  <!-- turn down to row 2 -->
  <line x1="975" y1="160" x2="975" y2="200" stroke="#4da3ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Row 2: execution + runtime safety -->
  <g font-size="12.5" font-weight="600">
    <!-- EXECUTE -->
    <rect x="905" y="202" width="140" height="60" rx="10" fill="#12161d" stroke="#2f3947"/>
    <text x="975" y="228" fill="#e7ecf3" text-anchor="middle">EXECUTE</text>
    <text x="975" y="246" fill="#8b95a5" font-size="10" font-weight="400" text-anchor="middle">tool adapters</text>

    <line x1="905" y1="232" x2="746" y2="232" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- OBSERVE -->
    <rect x="606" y="202" width="140" height="60" rx="10" fill="#12161d" stroke="#2f3947"/>
    <text x="676" y="228" fill="#e7ecf3" text-anchor="middle">OBSERVE</text>
    <text x="676" y="246" fill="#8b95a5" font-size="10" font-weight="400" text-anchor="middle">independent signals</text>

    <line x1="606" y1="232" x2="447" y2="232" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- DETECT -->
    <rect x="307" y="202" width="140" height="60" rx="10" fill="#12161d" stroke="#2f3947"/>
    <text x="377" y="222" fill="#e7ecf3" text-anchor="middle">DETECT</text>
    <text x="377" y="238" fill="#8b95a5" font-size="9.5" font-weight="400" text-anchor="middle">SPEC-009 sentinel</text>
    <text x="377" y="251" fill="#f5a623" font-size="9.5" font-weight="600" text-anchor="middle">R0 → R4 / R_UNKNOWN</text>

    <line x1="307" y1="232" x2="148" y2="232" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- INTERVENE -->
    <rect x="8" y="202" width="140" height="60" rx="10" fill="#12161d" stroke="#f2495c" stroke-opacity="0.5"/>
    <text x="78" y="222" fill="#e7ecf3" text-anchor="middle">INTERVENE</text>
    <text x="78" y="238" fill="#f2495c" font-size="9.5" font-weight="600" text-anchor="middle">I0 → I9</text>
    <text x="78" y="251" fill="#8b95a5" font-size="9" font-weight="400" text-anchor="middle">reduces authority only</text>
  </g>

  <line x1="78" y1="262" x2="78" y2="300" stroke="#f2495c" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Row 3: containment + recovery + learn -->
  <g font-size="12.5" font-weight="600">
    <rect x="8" y="302" width="170" height="60" rx="10" fill="#12161d" stroke="#2f3947"/>
    <text x="93" y="322" fill="#e7ecf3" text-anchor="middle">VERIFY CONTAINMENT</text>
    <text x="93" y="338" fill="#8b95a5" font-size="9.5" font-weight="400" text-anchor="middle">independent source</text>
    <text x="93" y="351" fill="#8b95a5" font-size="9.5" font-weight="400" text-anchor="middle">STOP ≠ STOPPED</text>

    <line x1="178" y1="332" x2="212" y2="332" stroke="#f5a623" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="214" y="302" width="150" height="60" rx="10" fill="#12161d" stroke="#2f3947"/>
    <text x="289" y="328" fill="#e7ecf3" text-anchor="middle">RECOVER</text>
    <text x="289" y="346" fill="#8b95a5" font-size="10" font-weight="400" text-anchor="middle">SPEC-010</text>

    <line x1="364" y1="332" x2="398" y2="332" stroke="#f5a623" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="400" y="302" width="150" height="60" rx="10" fill="#12161d" stroke="#2f3947"/>
    <text x="475" y="328" fill="#e7ecf3" text-anchor="middle">LEARN</text>
    <text x="475" y="346" fill="#8b95a5" font-size="10" font-weight="400" text-anchor="middle">SPEC-013 attribution</text>
  </g>

  <!-- loop back to ASSESS -->
  <path d="M 475 302 C 475 260, 457 220, 457 162" fill="none" stroke="#34d399" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrowMuted)"/>
  <text x="500" y="230" fill="#34d399" font-size="10.5" font-style="italic">competence evidence feeds future assessment</text>

  <!-- Legend -->
  <g font-size="11" fill="#5a6474">
    <rect x="30" y="470" width="12" height="12" fill="#4da3ff" rx="2"/>
    <text x="48" y="480">Decision plane (pre-execution)</text>
    <rect x="260" y="470" width="12" height="12" fill="#2dd4bf" rx="2"/>
    <text x="278" y="480">Execution &amp; runtime safety</text>
    <rect x="470" y="470" width="12" height="12" fill="#f5a623" rx="2"/>
    <text x="488" y="480">Recovery</text>
    <rect x="570" y="470" width="12" height="12" fill="#34d399" rx="2"/>
    <text x="588" y="480">Learning feedback (dashed)</text>
  </g>

  <text x="30" y="520" fill="#5a6474" font-size="11">
    Core guarantee: Authorized ≠ SafeForever · MissingData ≠ SafeState · Alert ≠ Intervention · StopRequested ≠ Stopped
  </text>
  <text x="30" y="540" fill="#5a6474" font-size="11">Full specification set: github.com/RishiM19/AEGIS/tree/main/handbook</text>
</svg>
